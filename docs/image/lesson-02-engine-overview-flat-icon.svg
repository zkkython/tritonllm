<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" width="1200" height="860">
  <style>
    text {
      font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .title {
      font-size: 28px;
      font-weight: 600;
      fill: #111827;
    }
    .subtitle {
      font-size: 14px;
      fill: #6b7280;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      fill: #111827;
    }
    .layer-title {
      font-size: 14px;
      font-weight: 600;
      fill: #374151;
    }
    .label {
      font-size: 16px;
      font-weight: 600;
      fill: #111827;
    }
    .small {
      font-size: 12px;
      fill: #6b7280;
    }
    .edge-label {
      font-size: 12px;
      fill: #4b5563;
    }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>

  <rect width="1200" height="860" fill="#ffffff"/>

  <text x="60" y="58" class="title">vLLM Engine 总关系图</text>
  <text x="60" y="86" class="subtitle">前端门面、桥接层、内核循环与流式输出的对象回流</text>

  <rect x="50" y="120" width="300" height="540" rx="18" ry="18" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="370" y="120" width="320" height="540" rx="18" ry="18" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="710" y="120" width="440" height="540" rx="18" ry="18" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>

  <text x="70" y="155" class="section-title">前端协调层</text>
  <text x="390" y="155" class="section-title">桥接与通信层</text>
  <text x="730" y="155" class="section-title">内核执行层</text>

  <rect x="80" y="190" width="240" height="88" rx="12" ry="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="100" y="210" width="40" height="40" rx="10" ry="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <circle cx="120" cy="224" r="7" fill="none" stroke="#2563eb" stroke-width="2"/>
  <path d="M120 231 L120 242 M112 238 L128 238" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <text x="155" y="226" class="label">API Server</text>
  <text x="155" y="246" class="small">上层调用入口</text>

  <rect x="80" y="314" width="240" height="104" rx="12" ry="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="100" y="338" width="40" height="40" rx="10" ry="10" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <rect x="109" y="348" width="22" height="20" rx="4" ry="4" fill="none" stroke="#2563eb" stroke-width="2"/>
  <path d="M114 354 H126 M114 360 H126" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <text x="155" y="354" class="label">AsyncLLM</text>
  <text x="155" y="376" class="small">接单、建队列、yield 流式结果</text>
  <text x="155" y="394" class="small">门面，不直接调度模型</text>

  <rect x="80" y="454" width="110" height="120" rx="12" ry="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <rect x="105" y="475" width="60" height="44" rx="10" ry="10" fill="#dcfce7" stroke="#86efac" stroke-width="1.2"/>
  <path d="M117 488 H152 M117 499 H145" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round"/>
  <text x="135" y="542" text-anchor="middle" class="label">Input</text>
  <text x="135" y="560" text-anchor="middle" class="label">Processor</text>
  <text x="135" y="579" text-anchor="middle" class="small">统一请求形态</text>

  <rect x="210" y="454" width="110" height="120" rx="12" ry="12" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <rect x="235" y="475" width="60" height="44" rx="10" ry="10" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.2"/>
  <path d="M246 490 H284 M246 501 H278" fill="none" stroke="#9333ea" stroke-width="2" stroke-linecap="round"/>
  <text x="265" y="542" text-anchor="middle" class="label">Output</text>
  <text x="265" y="560" text-anchor="middle" class="label">Processor</text>
  <text x="265" y="579" text-anchor="middle" class="small">翻译内核输出</text>

  <rect x="400" y="220" width="260" height="108" rx="12" ry="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <rect x="425" y="246" width="42" height="42" rx="10" ry="10" fill="#ffedd5" stroke="#fdba74" stroke-width="1.2"/>
  <rect x="435" y="257" width="22" height="20" rx="4" ry="4" fill="none" stroke="#ea580c" stroke-width="2"/>
  <path d="M439 263 H453 M439 269 H448" fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round"/>
  <text x="485" y="258" class="label">EngineCoreClient</text>
  <text x="485" y="280" class="small">前后端桥接层</text>
  <text x="485" y="298" class="small">选择单进程 / 多进程 / DP client</text>

  <rect x="400" y="388" width="260" height="154" rx="12" ry="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="430" y="420" class="layer-title">ZeroMQ 面</text>
  <rect x="425" y="442" width="90" height="70" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="470" y="470" text-anchor="middle" class="label">ROUTER</text>
  <text x="470" y="489" text-anchor="middle" class="small">控制面</text>
  <rect x="545" y="442" width="90" height="70" rx="10" ry="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.2"/>
  <text x="590" y="470" text-anchor="middle" class="label">PULL</text>
  <text x="590" y="489" text-anchor="middle" class="small">输出回流</text>
  <text x="430" y="532" class="small">输入请求与控制消息走 ROUTER/DEALER</text>
  <text x="430" y="550" class="small">阶段性结果走 PUSH/PULL</text>

  <rect x="760" y="196" width="340" height="116" rx="12" ry="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="788" y="224" width="42" height="42" rx="10" ry="10" fill="#ffedd5" stroke="#fdba74" stroke-width="1.2"/>
  <rect x="798" y="235" width="22" height="20" rx="4" ry="4" fill="none" stroke="#ea580c" stroke-width="2"/>
  <path d="M802 241 H816 M802 247 H811" fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round"/>
  <text x="848" y="236" class="label">EngineCore</text>
  <text x="848" y="258" class="small">内核循环：schedule -&gt; execute -&gt; update</text>
  <text x="848" y="276" class="small">独立存在，隔离 API 与 worker 细节</text>

  <rect x="760" y="360" width="150" height="108" rx="12" ry="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="790" y="385" width="34" height="34" rx="8" ry="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.1"/>
  <path d="M800 396 H814 M800 403 H814 M800 410 H810" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <text x="852" y="404" text-anchor="middle" class="label">Scheduler</text>
  <text x="852" y="438" text-anchor="middle" class="small">决定本 step</text>
  <text x="852" y="456" text-anchor="middle" class="small">执行什么</text>

  <rect x="945" y="360" width="155" height="108" rx="12" ry="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <rect x="975" y="385" width="34" height="34" rx="8" ry="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.1"/>
  <rect x="983" y="393" width="18" height="18" rx="3" ry="3" fill="none" stroke="#16a34a" stroke-width="2"/>
  <text x="1054" y="404" text-anchor="middle" class="label">Executor /</text>
  <text x="1054" y="424" text-anchor="middle" class="label">Worker</text>
  <text x="1054" y="456" text-anchor="middle" class="small">执行模型前向</text>

  <rect x="885" y="540" width="170" height="92" rx="12" ry="12" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.5"/>
  <rect x="915" y="562" width="36" height="28" rx="8" ry="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.1"/>
  <path d="M924 571 H943 M924 578 H939" fill="none" stroke="#9333ea" stroke-width="2" stroke-linecap="round"/>
  <text x="1012" y="578" text-anchor="middle" class="label">ModelRunner</text>
  <text x="1012" y="599" text-anchor="middle" class="label">Output</text>
  <text x="1012" y="620" text-anchor="middle" class="small">阶段性执行结果</text>

  <rect x="92" y="708" width="268" height="78" rx="12" ry="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="122" y="739" class="label">RequestOutput</text>
  <text x="122" y="762" class="small">最终被 AsyncLLM 流式 yield 给调用方</text>

  <path d="M320 366 H385" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <rect x="332" y="344" width="64" height="18" rx="6" ry="6" fill="#ffffff" fill-opacity="0.92"/>
  <text x="340" y="357" class="edge-label">桥接请求</text>

  <path d="M200 418 V442" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="128" y="426" width="52" height="18" rx="6" ry="6" fill="#ffffff" fill-opacity="0.92"/>
  <text x="138" y="439" class="edge-label">标准化</text>

  <path d="M530 328 V432" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="544" y="368" width="64" height="18" rx="6" ry="6" fill="#ffffff" fill-opacity="0.92"/>
  <text x="551" y="381" class="edge-label">发送请求</text>

  <path d="M635 476 H744 V254 H760" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <rect x="673" y="454" width="112" height="18" rx="6" ry="6" fill="#ffffff" fill-opacity="0.94"/>
  <text x="682" y="467" class="edge-label">ROUTER / DEALER</text>

  <path d="M930 312 V347" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="944" y="324" width="62" height="18" rx="6" ry="6" fill="#ffffff" fill-opacity="0.92"/>
  <text x="952" y="337" class="edge-label">分解 step</text>

  <path d="M910 414 H936" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <rect x="915" y="338" width="74" height="34" rx="6" ry="6" fill="#ffffff" fill-opacity="0.94"/>
  <text x="924" y="352" class="edge-label">调度后</text>
  <text x="924" y="366" class="edge-label">执行</text>

  <path d="M1022 468 V520 H972 V532" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <rect x="1032" y="492" width="62" height="18" rx="6" ry="6" fill="#ffffff" fill-opacity="0.92"/>
  <text x="1041" y="505" class="edge-label">结果产出</text>

  <path d="M885 586 H844 V468" fill="none" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <rect x="790" y="512" width="62" height="18" rx="6" ry="6" fill="#ffffff" fill-opacity="0.94"/>
  <text x="799" y="525" class="edge-label">状态更新</text>

  <path d="M885 608 H700 V628 H590 V520" fill="none" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <rect x="705" y="614" width="128" height="18" rx="6" ry="6" fill="#ffffff" fill-opacity="0.94"/>
  <text x="714" y="627" class="edge-label">PUSH / PULL 输出回流</text>

  <path d="M545 560 H338 V514 H320" fill="none" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <rect x="388" y="566" width="86" height="18" rx="6" ry="6" fill="#ffffff" fill-opacity="0.94"/>
  <text x="396" y="579" class="edge-label">内部输出翻译</text>

  <path d="M265 574 V698" fill="none" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <rect x="276" y="626" width="98" height="32" rx="6" ry="6" fill="#ffffff" fill-opacity="0.94"/>
  <text x="284" y="640" class="edge-label">组装用户</text>
  <text x="284" y="654" class="edge-label">可见结果</text>

  <path d="M225 708 V640 H240 V418" fill="none" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <rect x="118" y="646" width="96" height="18" rx="6" ry="6" fill="#ffffff" fill-opacity="0.94"/>
  <text x="126" y="659" class="edge-label">按请求队列回流</text>

  <g transform="translate(760 728)">
    <rect x="0" y="0" width="368" height="96" rx="12" ry="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="20" y="26" class="layer-title">图例</text>
    <rect x="20" y="40" width="22" height="22" rx="6" ry="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="54" y="55" class="small">蓝线：主调用 / 控制流</text>
    <rect x="160" y="40" width="22" height="22" rx="6" ry="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <text x="194" y="55" class="small">绿线：执行与模型输出</text>
    <rect x="20" y="64" width="22" height="22" rx="6" ry="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
    <text x="54" y="79" class="small">紫线：流式结果回流</text>
  </g>
</svg>
